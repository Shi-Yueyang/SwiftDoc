name: Build Windows release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build exe
        run: |
          pyinstaller `
            --name swift-doc `
            --onefile `
            --paths src `
            --collect-all tree_sitter `
            --collect-all tree_sitter_c `
            --collect-all tree_sitter_ada `
            --noconfirm `
            src/cli.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: swift-doc-windows
          path: dist/
