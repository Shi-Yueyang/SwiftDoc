# swift-doc.toml — example config for the C example project
#
# Run with:
#   swift-doc examples/c/swift-doc.toml
#   swift-doc md examples/c

root_dir = "examples/c"
type = "moduledesign"

# --- Output options ---
lang = "c"                  # "auto" | "c" | "ada"
output_folder = "out"       # where generated docs land
format = "docx"             # "docx" | "markdown"
group_by = "file"           # "file" | "function"
style = "plain"

# --- Extraction options ---
ai = "off"                  # "off" | "on"
# cache_dir = ".analysis"   # uncomment to override the platform default
# analyse_dirs = [          # uncomment to scope docs to specific files/dirs
#     "examples/c/bsw",
#     "examples/c/drivers",
# ]

# --- Ignore lists ---
[ignore]
# Function calls to exclude from call graphs (memcpy & memset are always ignored)
calls = []
# Type names to skip
types = []
# Type kinds to skip:
#   C: struct, union, enum, typedef
#   Ada: record, enumeration, access, array, derived, subtype,
#        modular, fixed_point, decimal_fixed_point, float, interface, private, type
#   (empty = keep all)
kinds = []
